<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
  overflow-x:hidden;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,120,0.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,255,120,0.08), transparent 40%);
  animation: bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg {
  from { transform:scale(1); opacity:0.7; }
  to { transform:scale(1.1); opacity:1; }
}

h2 {
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.65);
  box-shadow:0 0 18px #00ff99;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover {
  transform:scale(1.05);
}

#status {
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity:0.4; }
}

.user {
  border:1px solid #00ff99;
  padding:5px;
  margin:4px;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">OFFLINE</span>
</div>

<!-- 🔐 AUTH SECTION -->
<div class="box">
  <input id="name" placeholder="Username (10+ chars)" />
  <br/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Sign In</button>
</div>

<div class="box">
  Your Identity:
  <div id="myId">---</div>
</div>

<div class="box">
  <input id="callTo" placeholder="Call user ID" />
  <br/>
  <button onclick="callUser()">Call</button>
  <button onclick="endCall()">End</button>
</div>

<div class="box">
  <b>🧠 Online Users</b>
  <div id="network"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<!-- KEEP YOUR STYLE SAME (NOT CHANGED) -->

<script>
  let peer;
let stream;
let ws;
let username;
let currentCall;
let activePeerCall;

/* -------------------- */
/* WS CONNECT */
/* -------------------- */

function connectWS(){

  ws = new WebSocket(
    (location.protocol === "https:" ? "wss" : "ws") +
    "://" + location.host
  );

  ws.onmessage = async (msg) => {

    const data = JSON.parse(msg.data);

    /* USERS */
    if(data.type === "users"){
      renderUsers(data.users);
    }

    /* AUTH */
    if(data.type === "error") alert(data.message);
    if(data.type === "ok") setStatus(data.message);

    /* INCOMING CALL */
    if(data.type === "incoming-call"){

      setStatus("📳 RINGING...");

      showIncoming(data.from, data.peerId);
    }

    /* CALL START */
    if(data.type === "call-start"){
      setStatus("🔵 ON CALL");
    }

    /* CALL REJECTED */
    if(data.type === "call-rejected"){
      setStatus("❌ Rejected");
      hideIncoming();
    }

    /* CALL ENDED */
    if(data.type === "call-ended"){
      setStatus("📴 Call ended");

      if(activePeerCall) activePeerCall.close();
    }
  };
}

/* -------------------- */
/* SIGNUP */
/* -------------------- */

function signup(){

  username = getName();

  ws.send(JSON.stringify({
    type:"signup",
    username
  }));
}

/* -------------------- */
/* SIGNIN */
/* -------------------- */

async function signin(){

  username = getName();

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  peer = new Peer(username);

  peer.on("open", ()=>{

    ws.send(JSON.stringify({
      type:"signin",
      username,
      peerId: username
    }));

    setStatus("🟢 ONLINE");
    document.getElementById("myId").innerText = username;
  });

  /* RECEIVE CALL AUDIO */
  peer.on("call", (call)=>{

    call.answer(stream);
    activePeerCall = call;

    call.on("stream", (remote)=>{
      document.getElementById("audio").srcObject = remote;
    });
  });
}

/* -------------------- */
/* CALL USER */
/* -------------------- */

function callUser(id){

  setStatus("📞 CALLING...");

  ws.send(JSON.stringify({
    type:"call-request",
    from: username,
    to: id
  }));

  activePeerCall = peer.call(id, stream);
}

/* -------------------- */
/* ACCEPT */
/* -------------------- */

function acceptCall(){

  ws.send(JSON.stringify({
    type:"accept-call",
    from: username,
    to: incoming.from
  }));

  hideIncoming();
}

/* -------------------- */
/* REJECT */
/* -------------------- */

function rejectCall(){

  ws.send(JSON.stringify({
    type:"reject-call",
    to: incoming.from
  }));

  hideIncoming();
}

/* -------------------- */
/* END CALL (FIXED) */
/* -------------------- */

function endCall(){

  if(activePeerCall) activePeerCall.close();

  ws.send(JSON.stringify({
    type:"end-call",
    from: username,
    to: currentCallTarget
  }));

  setStatus("Idle");
}

/* -------------------- */
/* UI HELPERS */
/* -------------------- */

function getName(){
  return document.getElementById("name").value.trim();
}

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* -------------------- */
/* INCOMING UI */
/* -------------------- */

let incoming = null;
let currentCallTarget = null;

function showIncoming(from, peerId){

  incoming = {from, peerId};
  currentCallTarget = from;

  const div = document.createElement("div");
  div.id = "incoming";
  div.style = `
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#000;
    border:2px solid #00ff99;
    padding:15px;
    z-index:999;
  `;

  div.innerHTML = `
    📳 Incoming Call from <b>${from}</b><br><br>
    <button onclick="acceptCall()">Accept</button>
    <button onclick="rejectCall()">Reject</button>
  `;

  document.body.appendChild(div);
}

function hideIncoming(){
  const el = document.getElementById("incoming");
  if(el) el.remove();
}

/* -------------------- */

connectWS();
</script>

</body>
</html>
