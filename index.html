<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#020702;
  color:#00ff99;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at 20% 20%, rgba(0,255,120,0.15), transparent 40%),
  radial-gradient(circle at 80% 70%, rgba(0,255,120,0.10), transparent 40%);
  animation:bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.1);
  }
}

.box{
  width:360px;
  margin:15px auto;
  padding:15px;
  border-radius:12px;
  border:1px solid #00ff99;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 20px #00ff99;
}

h2{
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

input,button{
  width:95%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover{
  cursor:pointer;
  transform:scale(1.03);
}

#status{
  font-weight:bold;
  text-shadow:0 0 10px #00ff99;
}

.user{
  padding:8px;
  margin:5px;
  border:1px solid #00ff99;
  border-radius:8px;
}

#incoming{
  display:none;
}

</style>
</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">
Status:
<div id="status">Idle</div>
</div>

<div class="box">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Register</button>
<button onclick="login()">Login</button>

</div>

<div class="box">

Your Identity:
<div id="myId">---</div>

</div>

<div class="box">

<input id="callTo" placeholder="Username to call">

<button onclick="callUser()">Call</button>
<button onclick="endCall()">End Call</button>

</div>

<div class="box" id="incoming">

<h3>📞 Incoming Call</h3>

<div id="callerName"></div>

<button onclick="acceptCall()">Receive Call</button>

</div>

<div class="box">

<b>Known Users</b>

<div id="network"></div>

</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

const SERVER = "https://internetphoneapp.onrender.com";
let peer = null;
let localStream = null;
let currentCall = null;
let loggedIn = false;
let myUsername = "";
let incomingCall = null;

let knownUsers =
  JSON.parse(localStorage.getItem("knownUsers") || "[]");

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function renderUsers(){

  const network = document.getElementById("network");

  network.innerHTML = "";

  knownUsers.forEach(user => {

    const div = document.createElement("div");

    div.className = "user";

    div.innerText = user;

    network.appendChild(div);

  });

}

function saveUsers(){
  localStorage.setItem(
    "knownUsers",
    JSON.stringify(knownUsers)
  );
}

async function signup(){

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  if(!username || !password){
    alert("Enter username and password");
    return;
  }

  setStatus("🟡 Registering...");

  try{

    const res = await fetch(SERVER + "/signup",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        username,
        password
      })
    });

    const data = await res.json();

    if(data.success){

      setStatus("✅ Registered");

    }else{

      setStatus("❌ " + data.message);

    }

  }catch(err){

    console.log(err);

    setStatus("❌ Signup failed");

  }

}

async function login(){

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  if(!username || !password){
    alert("Enter username and password");
    return;
  }

  setStatus("🔐 Logging in");

  try{

    const res = await fetch(SERVER + "/login",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        username,
        password
      })
    });

    const data = await res.json();

    if(!data.success){

      setStatus("❌ " + data.message);

      return;
    }

    setStatus("Authenticating...");

    myUsername = data.username;

    document.getElementById("myId")
    .innerText = myUsername;

    loggedIn = true;

    await startPeer();

  }catch(err){

    console.log(err);

    setStatus("❌ Login failed");

  }

}

async function startPeer(){

  try{

    localStream =
      await navigator.mediaDevices.getUserMedia({
        audio:true
      });

    peer = new Peer(myUsername,{
      host:window.location.hostname,
      port:window.location.port || (
        location.protocol === "https:" ? 443 : 80
      ),
      path:"/peerjs"
    });

    peer.on("open", id => {

      setStatus("🟢 Logged in");

      setTimeout(()=>{
        setStatus("📞 Ready state");
      },1000);

    });

    peer.on("call", call => {

      incomingCall = call;

      document.getElementById("incoming")
      .style.display = "block";

      document.getElementById("callerName")
      .innerText =
        "📞 Ringing from: " + call.peer;

      setStatus("📞 Ringing");

    });

    peer.on("error", err => {

      console.log(err);

      setStatus("❌ Peer Error");

    });

  }catch(err){

    console.log(err);

    setStatus("❌ Microphone denied");

  }

}

function acceptCall(){

  if(!incomingCall) return;

  incomingCall.answer(localStream);

  currentCall = incomingCall;

  setStatus("📞 Call Connected");

  incomingCall.on("stream", remoteStream => {

    document.getElementById("remoteAudio")
    .srcObject = remoteStream;

  });

  document.getElementById("incoming")
  .style.display = "none";

  if(!knownUsers.includes(incomingCall.peer)){

    knownUsers.push(incomingCall.peer);

    saveUsers();

    renderUsers();

  }

}

function callUser(){

  if(!loggedIn){

    alert("Login first");

    return;

  }

  const target =
    document.getElementById("callTo")
    .value
    .trim()
    .toLowerCase();

  if(!target){

    alert("Enter username");

    return;

  }

  setStatus("📞 Calling " + target);

  const call =
    peer.call(target, localStream);

  currentCall = call;

  call.on("stream", remoteStream => {

    document.getElementById("remoteAudio")
    .srcObject = remoteStream;

    setStatus("📞 In Call");

  });

  call.on("close", () => {

    setStatus("Call Ended");

  });

  call.on("error", () => {

    setStatus("❌ Call Failed");

  });

  if(!knownUsers.includes(target)){

    knownUsers.push(target);

    saveUsers();

    renderUsers();

  }

}

function endCall(){

  if(currentCall){

    currentCall.close();

  }

  currentCall = null;

  document.getElementById("remoteAudio")
  .srcObject = null;

  setStatus("Idle");

}

renderUsers();

</script>

</body>
</html>
