<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEON Voice Mesh</title>

<style>
body { margin:0; font-family:Arial; background:#050a05; color:#00ff99; }
.box { margin:10px auto; width:350px; padding:15px; border:1px solid #00ff99; }
.user { padding:8px; border:1px solid #00ff99; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<h2 style="text-align:center;">NEON VOICE MESH</h2>

<div class="box">
<input id="name" placeholder="Username (min 10 chars)">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div class="box">
Status: <span id="status">Idle</span>
</div>

<div class="box">
<h3>Online Users</h3>
<div id="users"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

let ws;
let peer;
let stream;
let username;

/* -------------------------- */
/* CONNECT WS */
/* -------------------------- */

function connect(){

    const proto = location.protocol === "https:" ? "wss" : "ws";

    ws = new WebSocket(proto + "://" + location.host);

    ws.onmessage = (msg)=>{

        const data = JSON.parse(msg.data);

        if(data.type === "users"){
            renderUsers(data.users);
        }

        if(data.type === "error"){
            alert(data.message);
        }

        if(data.type === "ok"){
            alert(data.message);
        }

    };

}

/* -------------------------- */
/* SIGNUP */
/* -------------------------- */

function signup(){

    username = document.getElementById("name").value.trim();

    ws.send(JSON.stringify({
        type:"signup",
        username
    }));

}

/* -------------------------- */
/* LOGIN */
/* -------------------------- */

async function login(){

    username = document.getElementById("name").value.trim();

    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    peer = new Peer(username);

    peer.on("open",()=>{

        ws.send(JSON.stringify({
            type:"login",
            username,
            peerId: username
        }));

        document.getElementById("status").innerText = "Online";

    });

}

/* -------------------------- */
/* RENDER USERS */
/* -------------------------- */

function renderUsers(users){

    const box = document.getElementById("users");

    box.innerHTML = "";

    users.forEach(u=>{

        if(u.username === username) return;

        const div = document.createElement("div");

        div.className = "user";

        div.innerText = u.username;

        div.onclick = ()=>callUser(u.peerId);

        box.appendChild(div);

    });

}

/* -------------------------- */
/* CALL USER */
/* -------------------------- */

function callUser(id){

    const call = peer.call(id, stream);

    call.on("stream",(remote)=>{

        document.getElementById("audio").srcObject = remote;

    });

}

/* -------------------------- */

connect();

</script>

</body>
</html>
