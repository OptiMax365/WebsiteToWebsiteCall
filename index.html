<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
}

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.65);
  box-shadow:0 0 18px #00ff99;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
}

button:hover { cursor:pointer; }

#status { animation: blink 1.2s infinite; }
@keyframes blink { 50% { opacity:0.4; } }

.user {
  border:1px solid #00ff99;
  padding:5px;
  margin:4px;
  border-radius:6px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">Idle</span>
</div>

<div class="box">
  <input id="name" placeholder="username" />
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div class="box">
  Your Identity:
  <div id="myId">---</div>
</div>

<div class="box">
  <input id="callTo" placeholder="Peer ID" />
  <button onclick="callUser()">Call</button>
  <button onclick="endCall()">End</button>
</div>

<div class="box">
  <b>Network</b>
  <div id="network"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let peer;
let stream;
let call;
let ws;
let username;
let loggedIn = false;
let wsConnected = false;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* WS SINGLETON */
function connectWS(){
  if (wsConnected) return;

  ws = new WebSocket(location.origin.replace("http","ws"));
  wsConnected = true;

  ws.onmessage = (msg) => {
    const d = JSON.parse(msg.data);

    if (d.type === "signup-ok") setStatus("🟡 Registered");
    if (d.type === "signup-fail") setStatus("❌ Username exists");

    if (d.type === "login-ok") {
      setStatus("🔐 Logged in");
      startPeer(d.username);
    }

    if (d.type === "login-fail") {
      setStatus("❌ Login failed");
    }

    if (d.type === "user-list") {
      render(d.users);
    }
  };

  ws.onclose = () => {
    wsConnected = false;
  };
}

/* SIGNUP */
function signup(){
  connectWS();
  setStatus("🟡 Registering");

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type:"signup",
      username: document.getElementById("name").value.trim()
    }));
  };
}

/* LOGIN */
async function login(){
  connectWS();

  setStatus("🔐 Logging in");

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type:"login",
      username: document.getElementById("name").value.trim()
    }));
  };
}

/* PEER START ONLY AFTER LOGIN */
function startPeer(user){
  if (loggedIn) return;
  loggedIn = true;

  username = user;

  const id = username + "_" + Math.random().toString(36).slice(2,7);

  peer = new Peer(id);

  document.getElementById("myId").innerText = id;

  peer.on("open", () => {
    setStatus("📞 Ready");

    ws.send(JSON.stringify({
      type:"register-peer",
      username,
      peerId:id
    }));
  });

  peer.on("call", c => {
    c.answer(stream);
    call = c;

    c.on("stream", r => {
      document.getElementById("audio").srcObject = r;
      setStatus("📞 In Call");
    });
  });
}

/* CALL */
function callUser(){
  if (!peer) return;

  const id = document.getElementById("callTo").value.trim();

  setStatus("Calling...");

  const c = peer.call(id, stream);
  call = c;

  c.on("stream", r => {
    document.getElementById("audio").srcObject = r;
    setStatus("📞 In Call");
  });
}

/* END CALL */
function endCall(){
  if (call) call.close();
  document.getElementById("audio").srcObject = null;
  setStatus("Idle");
}

/* UI */
function render(users){
  const box = document.getElementById("network");
  box.innerHTML = "";

  users.forEach(u => {
    const d = document.createElement("div");
    d.className = "user";
    d.innerText = u.username + " → " + u.peerId;
    box.appendChild(d);
  });
}
</script>

</body>
</html>
