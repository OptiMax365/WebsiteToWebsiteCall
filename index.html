<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

/* -------------------------- */
/* GLOBALS */
/* -------------------------- */

let ws;
let peer;
let stream;
let call;

let username;
let peerId;

/* -------------------------- */
/* STATUS */
/* -------------------------- */

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* -------------------------- */
/* START (LOGIN) */
/* -------------------------- */

async function start(){

  username =
    document.getElementById("name").value
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();

  if(!username){
    alert("Enter username");
    return;
  }

  stream =
    await navigator.mediaDevices.getUserMedia({
      audio:true
    });

  /* peer id is username (IMPORTANT CHANGE) */

  peerId = username;

  peer = new Peer(peerId);

  document.getElementById("myId").innerText = peerId;

  peer.on("open", ()=>{

    setStatus("ONLINE");

    connectServer();

  });

  peer.on("call", c=>{

    setStatus("Incoming call");

    c.answer(stream);

    call = c;

    c.on("stream", rstream=>{

      document.getElementById("audio").srcObject = rstream;

      setStatus("In call");

    });

  });

}

/* -------------------------- */
/* CONNECT SERVER */
/* -------------------------- */

function connectServer(){

  const protocol =
    location.protocol === "https:" ? "wss" : "ws";

  ws = new WebSocket(protocol + "://" + location.host);

  ws.onopen = ()=>{

    /* LOGIN USER */

    ws.send(JSON.stringify({
      type:"login",
      username: username,
      peerId: peerId
    }));

    /* heartbeat */
    setInterval(()=>{

      ws.send(JSON.stringify({
        type:"ping",
        username: username
      }));

    }, 3000);

  };

  ws.onmessage = (event)=>{

    const data = JSON.parse(event.data);

    if(data.type === "users"){

      renderUsers(data.users);

    }

  };

}

/* -------------------------- */
/* RENDER USERS */
/* -------------------------- */

function renderUsers(users){

  const box = document.getElementById("network");

  box.innerHTML = "";

  users.forEach(user=>{

    if(user.username === username) return;

    const div = document.createElement("div");

    div.className = "user";

    div.innerHTML = `
      🟢 ${user.username}
    `;

    div.onclick = ()=>{

      callPeer(user.peerId);

    };

    box.appendChild(div);

  });

}

/* -------------------------- */
/* CALL */
/* -------------------------- */

function callPeer(id){

  if(!peer || !stream) return;

  setStatus("Calling...");

  const c = peer.call(id, stream);

  call = c;

  c.on("stream", rstream=>{

    document.getElementById("audio").srcObject = rstream;

    setStatus("In call");

  });

}

/* -------------------------- */
/* MANUAL CALL BUTTON */
/* -------------------------- */

function callUser(){

  const id = document.getElementById("callTo").value;

  if(!id) return;

  callPeer(id);

}

/* -------------------------- */
/* END CALL */
/* -------------------------- */

function endCall(){

  if(call) call.close();

  call = null;

  document.getElementById("audio").srcObject = null;

  setStatus("Idle");

}

</script>
