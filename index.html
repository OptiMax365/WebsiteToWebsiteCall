<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON DISCOVER VOICE</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020702;
  color:#00ff99;
}

/* glowing background */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,120,0.12), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(0,255,120,0.08), transparent 40%);
  animation: bg 5s infinite alternate;
  z-index:-1;
}

@keyframes bg {
  from { transform:scale(1); opacity:0.7; }
  to { transform:scale(1.1); opacity:1; }
}

h2 {
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

.box {
  width:360px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.75);
  box-shadow:0 0 15px #00ff99;
  animation: float 4s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-6px); }
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover {
  transform:scale(1.05);
  cursor:pointer;
  box-shadow:0 0 20px #00ff99;
}

#status {
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity:0.4; }
}

/* DISCOVER USERS */
.user {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #00ff99;
  cursor:pointer;
  animation: pulse 1.5s infinite;
  transition:0.2s;
}

.user:hover {
  background:#003322;
  transform:scale(1.05);
}

@keyframes pulse {
  0% { box-shadow:0 0 5px #00ff99; }
  50% { box-shadow:0 0 18px #00ff99; }
  100% { box-shadow:0 0 5px #00ff99; }
}

.onlineDot {
  width:8px;
  height:8px;
  background:#00ff99;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  animation: blinkDot 1s infinite;
}

@keyframes blinkDot {
  50% { opacity:0.2; }
}
</style>
</head>

<body>

<h2>⚡ NEON DISCOVER NETWORK</h2>

<div class="box">
  Status: <span id="status">Offline</span>
</div>

<div class="box">
  <input id="name" placeholder="Enter username (This, etc)" />
  <br/>
  <button onclick="goOnline()">Go Online</button>
</div>

<div class="box">
  Your Username:
  <div id="myName">---</div>
</div>

<div class="box">
  <b>🌐 DISCOVER (Live Online Users)</b>
  <div id="discover"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let peer;
let stream;
let currentCall;
let myName;

let onlineUsers = {}; // live map

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* ---------------- START ---------------- */

async function goOnline(){

  myName = (document.getElementById("name").value || "This")
    .replace(/[^a-zA-Z]/g,"")
    .toLowerCase();

  document.getElementById("myName").innerText = myName;

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  peer = new Peer(myName + "_" + Math.random().toString(36).substr(2,4));

  peer.on("open", ()=>{
    setStatus("Online - Discover Active");
    broadcastPresence();
  });

  /* incoming calls */
  peer.on("call", call=>{
    setStatus("Incoming Call...");
    call.answer(stream);
    currentCall = call;

    call.on("stream", remote=>{
      document.getElementById("audio").srcObject = remote;
      setStatus("In Call");
    });
  });

  /* presence connections */
  peer.on("connection", conn=>{
    conn.on("data", data=>{
      if(data.type === "presence"){
        onlineUsers[data.name] = data.peer;
        renderDiscover();
      }
    });
  });

  setInterval(broadcastPresence, 3000);
}

/* ---------------- DISCOVER SYSTEM ---------------- */

function broadcastPresence(){
  if(!peer) return;

  for(let id in peer.connections){
    let connList = peer.connections[id];
    connList.forEach(conn=>{
      conn.send({
        type:"presence",
        name: myName,
        peer: peer.id
      });
    });
  }
}

/* ---------------- UI ---------------- */

function renderDiscover(){
  const box = document.getElementById("discover");
  box.innerHTML = "";

  for(let name in onlineUsers){
    let div = document.createElement("div");
    div.className = "user";
    div.innerHTML = `<span class="onlineDot"></span>${name}`;
    div.onclick = ()=>callUser(onlineUsers[name]);
    box.appendChild(div);
  }
}

/* ---------------- CALL ---------------- */

function callUser(id){
  if(!peer || !stream) return;

  setStatus("Calling " + id);

  const call = peer.call(id, stream);
  currentCall = call;

  call.on("stream", remote=>{
    document.getElementById("audio").srcObject = remote;
    setStatus("In Call");
  });
}

</script>

</body>
</html>
