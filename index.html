<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
  overflow-x:hidden;
}

/* animated glow background */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,120,0.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,255,120,0.08), transparent 40%);
  animation: bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg {
  from { transform:scale(1); opacity:0.7; }
  to { transform:scale(1.1); opacity:1; }
}

h2 {
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.65);
  box-shadow:0 0 18px #00ff99;
  animation: float 5s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-6px); }
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover {
  transform:scale(1.05);
  cursor:pointer;
  box-shadow:0 0 20px #00ff99;
}

#status {
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity:0.4; }
}

#myId {
  font-size:18px;
  text-shadow:0 0 10px #00ff99;
}

.user {
  border:1px solid #00ff99;
  padding:5px;
  margin:4px;
  border-radius:6px;
  animation: glow 2s infinite;
}

@keyframes glow {
  50% { box-shadow:0 0 10px #00ff99; }
}
</style>
</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">Idle</span>
</div>

<div class="box">
  <input id="name" placeholder="Enter username (This, etc)" />
  <br/>
  <button onclick="start()">Start Device</button>
</div>

<div class="box">
  Your Identity:
  <div id="myId">---</div>
</div>

<div class="box">
  <input id="callTo" placeholder="Call user ID" />
  <br/>
  <button onclick="callUser()">Call</button>
  <button onclick="endCall()">End</button>
</div>

<div class="box">
  <b>🧠 Your Known Network (stored on device)</b>
  <div id="network"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let peer;
let stream;
let call;
let deviceId;
let username;
let known = JSON.parse(localStorage.getItem("knownUsers") || "[]");

function setStatus(t){
  document.getElementById("status").innerText = t;
}

function saveKnown(){
  localStorage.setItem("knownUsers", JSON.stringify(known));
}

function render(){
  const box = document.getElementById("network");
  box.innerHTML = "";
  known.forEach(u=>{
    const div = document.createElement("div");
    div.className = "user";
    div.innerText = u;
    box.appendChild(div);
  });
}

function generateId(){
  return Math.random().toString(36).substr(2,9);
}

async function start(){
  username = (document.getElementById("name").value || "This")
    .replace(/[^a-zA-Z]/g,"")
    .toLowerCase();

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  deviceId = username + "_" + generateId();

  peer = new Peer(deviceId);

  document.getElementById("myId").innerText = deviceId;

  peer.on("open", ()=>{
    setStatus("Online (serverless mesh mode)");
  });

  peer.on("call", c=>{
    setStatus("Incoming call...");
    c.answer(stream);
    call = c;

    c.on("stream", rstream=>{
      document.getElementById("audio").srcObject = rstream;
      setStatus("In call");

      // store caller into local memory
      if(!known.includes(c.peer)){
        known.push(c.peer);
        saveKnown();
        render();
      }
    });
  });

  render();
}

function callUser(){
  const id = document.getElementById("callTo").value.trim();
  if(!id || !peer) return;

  setStatus("Calling " + id);

  const c = peer.call(id, stream);
  call = c;

  if(!known.includes(id)){
    known.push(id);
    saveKnown();
    render();
  }

  c.on("stream", rstream=>{
    document.getElementById("audio").srcObject = rstream;
    setStatus("In call");
  });
}

function endCall(){
  if(call) call.close();
  call = null;
  document.getElementById("audio").srcObject = null;
  setStatus("Idle");
}

render();
</script>

</body>
</html>
