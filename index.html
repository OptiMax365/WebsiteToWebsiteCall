<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
  overflow-x:hidden;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,120,0.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,255,120,0.08), transparent 40%);
  animation: bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg {
  from { transform:scale(1); opacity:0.7; }
  to { transform:scale(1.1); opacity:1; }
}

h2 { text-align:center; text-shadow:0 0 12px #00ff99; }

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.65);
  box-shadow:0 0 18px #00ff99;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover { cursor:pointer; transform:scale(1.05); }

#status { animation: blink 1.2s infinite; }

@keyframes blink { 50% { opacity:0.4; } }

.user {
  border:1px solid #00ff99;
  padding:5px;
  margin:4px;
  border-radius:6px;
}

</style>
</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">Idle</span>
</div>

<div class="box">
  <input id="name" placeholder="Username" />
  <button onclick="start()">Login</button>
</div>

<div class="box">
  Your ID:
  <div id="myId">---</div>
</div>

<div class="box">
  <input id="callTo" placeholder="Call user ID" />
  <button onclick="callUser()">Call</button>
  <button onclick="endCall()">End</button>
</div>

<div class="box">
  <b>Online Users</b>
  <div id="network"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let ws;
let peer;
let stream;
let call;
let myPeerId;
let username;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

function renderUsers(users){
  const box = document.getElementById("network");
  box.innerHTML = "";

  users.forEach(u=>{
    const div = document.createElement("div");
    div.className = "user";
    div.innerText = u.username + " → " + u.peerId;
    box.appendChild(div);
  });
}

async function start(){

  username = document.getElementById("name").value.trim().toLowerCase();
  if(!username) return;

  stream = await navigator.mediaDevices.getUserMedia({ audio:true });

  ws = new WebSocket(location.origin.replace("http","ws"));

  ws.onopen = () => {
    setStatus("Connecting...");
    ws.send(JSON.stringify({
      type:"signin",
      username,
      peerId:null
    }));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if(data.type === "error"){
      setStatus(data.message);
    }

    if(data.type === "ok" && data.message === "authenticated"){

      myPeerId = username + "_" + Math.random().toString(36).slice(2,7);

      peer = new Peer(myPeerId);

      document.getElementById("myId").innerText = myPeerId;

      peer.on("open", ()=>{
        setStatus("Online");
      });

      peer.on("call", c=>{
        c.answer(stream);
        call = c;

        c.on("stream", rstream=>{
          document.getElementById("audio").srcObject = rstream;
          setStatus("In call");
        });
      });
    }

    if(data.type === "users"){
      renderUsers(data.users);
    }

    if(data.type === "incoming-call"){
      setStatus("Incoming call...");

      const c = peer.call(data.peerId, stream);
      call = c;

      c.on("stream", rstream=>{
        document.getElementById("audio").srcObject = rstream;
        setStatus("In call");
      });
    }

    if(data.type === "call-ended"){
      if(call) call.close();
      document.getElementById("audio").srcObject = null;
      setStatus("Idle");
    }
  };
}

function callUser(){
  const id = document.getElementById("callTo").value.trim();

  ws.send(JSON.stringify({
    type:"call-request",
    from:username,
    to:id
  }));
}

function endCall(){
  if(call) call.close();

  ws.send(JSON.stringify({
    type:"end-call",
    from:username,
    to:document.getElementById("callTo").value.trim()
  }));

  setStatus("Idle");
}
</script>

</body>
</html>
