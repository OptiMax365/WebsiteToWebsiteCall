<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON VOICE MESH</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050a05;
  color:#00ff99;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,120,0.15), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(0,255,120,0.1), transparent 40%);
  z-index:-1;
  animation: pulse 6s infinite alternate;
}

@keyframes pulse {
  from { transform:scale(1); }
  to { transform:scale(1.1); }
}

.box {
  width:360px;
  margin:12px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.7);
  box-shadow:0 0 15px #00ff99;
}

input, button {
  width:95%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 8px #00ff99;
}

button {
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.07);
  box-shadow:0 0 18px #00ff99;
}

button:active {
  transform:scale(0.95);
}

#status {
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity:0.4; }
}

.user {
  border:1px solid #00ff99;
  padding:6px;
  margin:4px;
  border-radius:6px;
}

#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modalBox {
  background:#001a10;
  padding:20px;
  border:1px solid #00ff99;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
  Status: <span id="status">Idle</span>
</div>

<div class="box">
  <h3>Signup</h3>
  <input id="su" placeholder="username" />
  <button onclick="signup()">Signup</button>
</div>

<div class="box">
  <h3>Login</h3>
  <input id="li" placeholder="username" />
  <button onclick="login()">Login</button>
</div>

<div class="box">
  Your ID: <div id="myId">---</div>
</div>

<div class="box">
  <input id="callTo" placeholder="Call username" />
  <button onclick="callUser()">Call</button>
  <button onclick="endCall()">End</button>
</div>

<div class="box">
  <b>Online Users</b>
  <div id="users"></div>
</div>

<audio id="audio" autoplay></audio>

<div id="modal">
  <div class="modalBox">
    <h3 id="callText">Incoming Call</h3>
    <button onclick="accept()">Accept</button>
    <button onclick="reject()">Reject</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let ws;
let peer;
let stream;
let call;
let username;
let peerId;
let incoming;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* SIGNUP */
function signup(){
  const u=document.getElementById("su").value.trim();

  ws=new WebSocket(location.origin.replace("http","ws"));

  ws.onopen=()=>{
    ws.send(JSON.stringify({type:"signup",username:u}));
  };

  ws.onmessage=(m)=>{
    alert(JSON.parse(m.data).message);
  };
}

/* LOGIN */
async function login(){

  username=document.getElementById("li").value.trim();

  stream=await navigator.mediaDevices.getUserMedia({audio:true});

  ws=new WebSocket(location.origin.replace("http","ws"));

  ws.onopen=()=>{
    ws.send(JSON.stringify({type:"signin",username}));
  };

  ws.onmessage=(m)=>{
    const d=JSON.parse(m.data);

    if(d.type==="ok"){

      peerId=username+"_"+Math.random().toString(36).slice(2,7);

      peer=new Peer(peerId);

      document.getElementById("myId").innerText=peerId;

      peer.on("open",()=>{

        /* IMPORTANT FIX */
        ws.send(JSON.stringify({
          type:"peer-ready",
          username,
          peerId
        }));

        setStatus("Online");
      });

      peer.on("call",c=>{
        c.answer(stream);
        call=c;

        c.on("stream",r=>{
          document.getElementById("audio").srcObject=r;
          setStatus("In Call");
        });
      });
    }

    if(d.type==="users"){
      render(d.users);
    }

    if(d.type==="incoming-call"){
      incoming=d;
      document.getElementById("modal").style.display="flex";
      document.getElementById("callText").innerText="Call from "+d.from;
    }

    if(d.type==="call-start"){
      setStatus("Connecting...");
    }

    if(d.type==="call-ended"){
      if(call) call.close();
      setStatus("Idle");
    }
  };
}

/* USERS */
function render(users){
  const box=document.getElementById("users");
  box.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user";
    d.innerText=u.username+" → "+u.peerId;
    box.appendChild(d);
  });
}

/* CALL */
function callUser(){
  ws.send(JSON.stringify({
    type:"call",
    from:username,
    to:document.getElementById("callTo").value.trim()
  }));
  setStatus("Calling...");
}

/* ACCEPT */
function accept(){
  document.getElementById("modal").style.display="none";

  const c=peer.call(incoming.peerId,stream);
  call=c;

  c.on("stream",r=>{
    document.getElementById("audio").srcObject=r;
    setStatus("In Call");
  });

  ws.send(JSON.stringify({
    type:"accept",
    from:incoming.from,
    to:username
  }));
}

/* REJECT */
function reject(){
  document.getElementById("modal").style.display="none";
}

/* END */
function endCall(){
  if(call) call.close();

  ws.send(JSON.stringify({
    type:"end",
    from:username,
    to:document.getElementById("callTo").value.trim()
  }));
}
</script>

</body>
</html>
