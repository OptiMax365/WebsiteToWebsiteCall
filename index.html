<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEON VOICE MESH</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
}

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.7);
}

input, button {
  padding:10px;
  margin:5px;
  background:#001a10;
  color:#00ff99;
  border:none;
}

button:hover { transform:scale(1.05); cursor:pointer; }

.user {
  border:1px solid #00ff99;
  margin:4px;
  padding:5px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">OFFLINE</span>
</div>

<div class="box" id="auth">
  <input id="name" placeholder="Username (10+ chars)">
  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Login</button>
</div>

<div class="box" id="panel" style="display:none;">
  Logged in as: <b id="myId"></b>
  <button onclick="logout()">Logout</button>
</div>

<div class="box">
  <b>Online Users</b>
  <div id="users"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

let ws;
let peer;
let stream;
let username;
let activeCall;

/* CONNECT WS */
function connect(){
  ws = new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host);

  ws.onmessage = (msg)=>{

    const data = JSON.parse(msg.data);

    if(data.type==="users"){
      renderUsers(data.users);
    }

    if(data.type==="incoming-call"){
      alert("📳 Incoming call from " + data.from);
    }

    if(data.type==="call-start"){
      setStatus("🔵 ON CALL");
    }

    if(data.type==="call-ended"){
      setStatus("📴 Call ended");
      if(activeCall) activeCall.close();
    }

    if(data.type==="error") alert(data.message);
    if(data.type==="ok") setStatus(data.message);
  };
}

/* SIGNUP */
function signup(){
  username = getName();

  ws.send(JSON.stringify({
    type:"signup",
    username
  }));
}

/* LOGIN */
async function signin(){

  username = getName();

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  peer = new Peer(username + "_" + Math.random().toString(36).substr(2,5));

  peer.on("open",(id)=>{

    ws.send(JSON.stringify({
      type:"signin",
      username,
      peerId:id
    }));

    document.getElementById("auth").style.display="none";
    document.getElementById("panel").style.display="block";

    document.getElementById("myId").innerText=username;
    setStatus("ONLINE");
  });

  peer.on("call",(call)=>{
    call.answer(stream);
    activeCall = call;

    call.on("stream",(remote)=>{
      document.getElementById("audio").srcObject = remote;
    });
  });
}

/* CALL USER */
function callUser(peerId, user){
  ws.send(JSON.stringify({
    type:"call-request",
    from:username,
    to:user
  }));

  activeCall = peer.call(peerId, stream);
}

/* LOGOUT */
function logout(){
  ws.send(JSON.stringify({type:"logout"}));
  location.reload();
}

/* UI */
function renderUsers(users){
  const box=document.getElementById("users");
  box.innerHTML="";

  users.forEach(u=>{
    if(u.username===username) return;

    const div=document.createElement("div");
    div.className="user";
    div.innerText=u.username;

    div.onclick=()=>callUser(u.peerId,u.username);

    box.appendChild(div);
  });
}

function getName(){
  return document.getElementById("name").value.trim();
}

function setStatus(t){
  document.getElementById("status").innerText=t;
}

connect();

</script>

</body>
</html>
