<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8" />

<title>NEON Voice Mesh</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#020702;
  color:#00ff99;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at 20% 20%, rgba(0,255,120,0.15), transparent 40%),
  radial-gradient(circle at 80% 70%, rgba(0,255,120,0.10), transparent 40%);
  animation:bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.1);
  }
}

.box{
  width:360px;
  margin:15px auto;
  padding:15px;
  border-radius:12px;
  border:1px solid #00ff99;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 20px #00ff99;
}

h2{
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

input,button{
  width:95%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover{
  cursor:pointer;
  transform:scale(1.03);
}

#status{
  font-weight:bold;
}

#debug{
  height:240px;
  overflow-y:auto;
  background:#000;
  color:#00ff99;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  font-family:monospace;
  white-space:pre-wrap;
}

</style>

</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">

Status:

<div id="status">
Idle
</div>

</div>



<div class="box">

<input id="username" placeholder="Username">

<input id="password"
type="password"
placeholder="Password">

<button onclick="signup()">
Register
</button>

<button onclick="login()">
Login
</button>

<button onclick="logout()">
Logout
</button>

</div>



<div class="box">

Your Identity:

<div id="myId">
---
</div>

</div>



<div class="box">

<input id="callTo"
placeholder="Username to call">

<button onclick="callUser()">
Call
</button>

<button onclick="endCall()">
End Call
</button>

</div>



<div class="box" id="incoming"
style="display:none;">

<h3>📞 Incoming Call</h3>

<div id="callerName"></div>

<button onclick="acceptCall()">
Receive Call
</button>

</div>



<div class="box">

<b>NETWORK STRENGTH</b>

<div id="wifiText">
Checking...
</div>

<div style="
height:20px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:10px;
">

<div id="wifiBar" style="
width:100%;
height:100%;
background:#00ff99;
transition:0.5s;
"></div>

</div>

</div>



<div class="box">

<b>LIVE DEBUG CONSOLE</b>

<div id="debug"></div>

</div>



<audio id="remoteAudio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

const SERVER =
  "https://websitespeaks.onrender.com";

let peer = null;
let localStream = null;
let currentCall = null;
let incomingCall = null;

let loggedIn = false;
let myUsername = "";

let reconnecting = false;



function debug(msg){

  console.log(msg);

  const box =
    document.getElementById("debug");

  const time =
    new Date().toLocaleTimeString();

  box.innerHTML +=
    "[" + time + "] " + msg + "\n";

  box.scrollTop =
    box.scrollHeight;

}



function setStatus(text){

  debug("STATUS => " + text);

  document.getElementById(
    "status"
  ).innerText = text;

}



/*
========================================
SIGNUP
========================================
*/

async function signup(){

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  if(!username || !password){

    alert("Enter username/password");

    return;

  }

  setStatus("🟡 Registering...");

  try{

    const res =
      await fetch(SERVER + "/signup",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          username,
          password
        })
      });

    const data =
      await res.json();

    if(data.success){

      setStatus("✅ Registered");

    }else{

      setStatus("❌ " + data.message);

    }

  }catch(err){

    debug(err.toString());

    setStatus("❌ Signup failed");

  }

}



/*
========================================
LOGIN
========================================
*/

async function login(){

  if(peer){

    debug("Already connected");

    return;

  }

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  if(!username || !password){

    alert("Enter username/password");

    return;

  }

  setStatus("🔐 Logging in");

  try{

    const res =
      await fetch(SERVER + "/login",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          username,
          password
        })
      });

    const data =
      await res.json();

    if(!data.success){

      setStatus("❌ " + data.message);

      return;

    }

    myUsername =
      data.username;

    loggedIn = true;

    localStorage.setItem(
      "loggedUser",
      myUsername
    );

    document.getElementById(
      "myId"
    ).innerText =
      myUsername;

    await startPeer();

  }catch(err){

    debug(err.toString());

    setStatus("❌ Login failed");

  }

}



/*
========================================
START PEER
========================================
*/

async function startPeer(){

  if(reconnecting){

    return;

  }

  reconnecting = true;

  try{

    if(peer){

      peer.destroy();
      peer = null;
    }

    debug("Requesting microphone access...");

    if(!localStream){

      localStream =
        await navigator.mediaDevices.getUserMedia({
          audio:true
        });

    }

    debug("Microphone granted");

    peer = new Peer(myUsername,{
      host:"websitespeaks.onrender.com",
      secure:true,
      port:443,
      path:"/peerjs"
    });

    debug("Starting PeerJS...");



    peer.on("open", async(id)=>{

      reconnecting = false;

      debug("PEER OPENED => " + id);

      await fetch(
        SERVER + "/active",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            username:myUsername,
            peerId:id
          })
        }
      );

      setStatus("🟢 Logged in");

      setTimeout(()=>{

        setStatus("📞 Ready state");

      },1000);

    });



    peer.on("disconnected",()=>{

      debug("PEER DISCONNECTED");

      setStatus("⚠ Reconnecting...");

    });



    peer.on("close",()=>{

      debug("PEER CLOSED");

    });



    peer.on("error",(err)=>{

      reconnecting = false;

      debug("PEER ERROR");
      debug(JSON.stringify(err));

      if(
        err.type === "network" ||
        err.type === "socket-error" ||
        err.type === "server-error"
      ){

        setStatus(
          "⚠ Weak internet reconnecting..."
        );

        setTimeout(()=>{

          startPeer();

        },3000);

      }

    });



    peer.on("call",(call)=>{

      debug(
        "INCOMING CALL FROM => " +
        call.peer
      );

      incomingCall = call;

      document.getElementById(
        "incoming"
      ).style.display = "block";

      document.getElementById(
        "callerName"
      ).innerText =
        "📞 Ringing from: " +
        call.peer;

      setStatus("📞 Incoming Call");

    });

  }catch(err){

    reconnecting = false;

    debug(err.toString());

    setStatus("❌ Failed starting peer");

  }

}



/*
========================================
CALL USER
========================================
*/

async function callUser(){

  if(!loggedIn){

    setStatus("❌ Login required");

    return;

  }

  if(!peer){

    setStatus("❌ Peer unavailable");

    return;

  }

  const username =
    document.getElementById("callTo")
    .value
    .trim()
    .toLowerCase();

  if(!username){

    alert("Enter username");

    return;

  }

  try{

    const res =
      await fetch(
        SERVER +
        "/active/" +
        username
      );

    const data =
      await res.json();

    if(!data.peerId){

      setStatus("❌ User offline");

      return;

    }

    debug(
      "CALLING => " +
      data.peerId
    );

    currentCall =
      peer.call(
        data.peerId,
        localStream
      );

    currentCall.on(
      "stream",
      remoteStream=>{

        document.getElementById(
          "remoteAudio"
        ).srcObject =
          remoteStream;

        setStatus("📞 In Call");

      }
    );

    currentCall.on("close",()=>{

      setStatus("Call ended");

    });

    currentCall.on("error",(err)=>{

      debug(err.toString());

      setStatus("❌ Call failed");

    });

  }catch(err){

    debug(err.toString());

    setStatus("❌ Connection error");

  }

}



/*
========================================
ACCEPT CALL
========================================
*/

function acceptCall(){

  if(!incomingCall){

    return;

  }

  incomingCall.answer(localStream);

  currentCall = incomingCall;

  incomingCall.on("stream",stream=>{

    document.getElementById(
      "remoteAudio"
    ).srcObject = stream;

    setStatus("📞 Call Connected");

  });

  document.getElementById(
    "incoming"
  ).style.display = "none";

}



/*
========================================
END CALL
========================================
*/

function endCall(){

  if(currentCall){

    currentCall.close();

  }

  currentCall = null;

  document.getElementById(
    "remoteAudio"
  ).srcObject = null;

  setStatus("Idle");

}



/*
========================================
LOGOUT
========================================
*/

function logout(){

  localStorage.removeItem(
    "loggedUser"
  );

  loggedIn = false;

  myUsername = "";

  if(currentCall){

    currentCall.close();

  }

  if(peer){

    peer.destroy();

  }

  peer = null;

  document.getElementById(
    "myId"
  ).innerText = "---";

  setStatus("Logged out");

}



/*
========================================
NETWORK MONITOR
========================================
*/

async function monitorConnection(){

  try{

    const start =
      performance.now();

    await fetch(
      SERVER +
      "/health?t=" +
      Date.now(),
      {
        cache:"no-store"
      }
    );

    const latency =
      performance.now() - start;

    let strength = 100;

    if(latency > 1000){

      strength = 20;

    }else if(latency > 700){

      strength = 40;

    }else if(latency > 400){

      strength = 60;

    }else if(latency > 200){

      strength = 80;

    }

    document.getElementById(
      "wifiBar"
    ).style.width =
      strength + "%";

    if(strength > 80){

      document.getElementById(
        "wifiText"
      ).innerText =
        "🟢 Excellent Connection";

    }else if(strength > 60){

      document.getElementById(
        "wifiText"
      ).innerText =
        "🟡 Good Connection";

    }else if(strength > 40){

      document.getElementById(
        "wifiText"
      ).innerText =
        "🟠 Weak Connection";

    }else{

      document.getElementById(
        "wifiText"
      ).innerText =
        "🔴 Poor Connection";

    }

  }catch(err){

    document.getElementById(
      "wifiBar"
    ).style.width = "5%";

    document.getElementById(
      "wifiText"
    ).innerText =
      "❌ Offline";

  }

}

setInterval(
  monitorConnection,
  4000
);

monitorConnection();



/*
========================================
RESTORE SESSION
========================================
*/

window.onload = async()=>{

  debug("PAGE LOADED");

  const saved =
    localStorage.getItem(
      "loggedUser"
    );

  if(saved){

    myUsername = saved;

    loggedIn = true;

    document.getElementById(
      "myId"
    ).innerText =
      myUsername;

    debug(
      "RESTORING SESSION => " +
      myUsername
    );

    await startPeer();

  }

};



window.onerror = function(msg){

  debug("WINDOW ERROR:");
  debug(msg);

};

</script>

</body>
</html>
