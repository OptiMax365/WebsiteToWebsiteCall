<!DOCTYPE html>
<html>
<head>
<title>Click Tracker</title>
</head>

<body>

<h1>LIVE CLICKS</h1>

<h2 id="count">0</h2>

<button onclick="sendClick()">CLICK ME</button>

<script>

let ws;

function connect(){

    ws = new WebSocket("ws://localhost:3000");

    ws.onmessage = (event) => {

        const data = JSON.parse(event.data);

        if (data.type === "count") {
            document.getElementById("count").innerText = data.count;
        }
    };
}

function sendClick(){
    ws.send(JSON.stringify({
        type:"click"
    }));
}

connect();

</script>

</body>
</html>
