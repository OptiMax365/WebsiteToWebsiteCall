<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEON P2P VOICE NETWORK</title>

<style>
body{
    margin:0;
    background:#020702;
    color:#00ff99;
    font-family:Arial;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(0,255,120,0.15), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(0,255,120,0.1), transparent 40%);
    animation:bg 5s infinite alternate;
    z-index:-1;
}

@keyframes bg{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

h1{
    text-align:center;
    margin-top:20px;
    text-shadow:0 0 20px #00ff99;
}

.box{
    width:360px;
    margin:15px auto;
    padding:15px;
    border-radius:15px;
    background:rgba(0,0,0,0.75);
    border:1px solid #00ff99;
    box-shadow:0 0 20px #00ff99;
}

input{
    width:92%;
    padding:12px;
    background:#001a10;
    border:none;
    color:#00ff99;
    border-radius:10px;
    outline:none;
    box-shadow:0 0 10px #00ff99;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#003b22;
    color:#00ff99;
    cursor:pointer;
    box-shadow:0 0 10px #00ff99;
}

button:hover{
    transform:scale(1.03);
}

#status{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

.user{
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #00ff99;
    cursor:pointer;
    transition:0.2s;
    animation:pulse 2s infinite;
}

.user:hover{
    background:#003322;
    transform:scale(1.03);
}

@keyframes pulse{
    0%{box-shadow:0 0 5px #00ff99;}
    50%{box-shadow:0 0 20px #00ff99;}
    100%{box-shadow:0 0 5px #00ff99;}
}

.onlineDot{
    width:10px;
    height:10px;
    background:#00ff99;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:dot 1s infinite;
}

@keyframes dot{
    50%{opacity:0.2;}
}
</style>
</head>

<body>

<h1>⚡ NEON P2P NETWORK</h1>

<div class="box">
    STATUS:
    <span id="status">OFFLINE</span>
</div>

<div class="box">
    <input id="username" placeholder="Enter Username">
    <button onclick="goOnline()">GO ONLINE</button>
</div>

<div class="box">
    YOUR NAME:
    <div id="myName">---</div>
</div>

<div class="box">
    <b>🌐 LIVE PEERS</b>
    <div id="discover"></div>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

/* ----------------------------- */
/* GLOBAL STATE */
/* ----------------------------- */

let peer;
let myName;
let stream;
let currentCall;

/* FIXED: proper registry */
const peers = new Map();

/* ----------------------------- */
/* STATUS */
/* ----------------------------- */

function setStatus(t){
    document.getElementById("status").innerText = t;
}

/* ----------------------------- */
/* GO ONLINE */
/* ----------------------------- */

async function goOnline(){

    myName = (
        document.getElementById("username").value || "user"
    )
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();

    document.getElementById("myName").innerText = myName;

    stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    const myPeerId =
        "neon_" + myName + "_" + Math.floor(Math.random()*9999);

    peer = new Peer(myPeerId);

    peer.on("open",(id)=>{
        setStatus("ONLINE P2P");
        console.log("My ID:", id);
    });

    /* incoming calls */
    peer.on("call",(call)=>{

        setStatus("INCOMING CALL");

        call.answer(stream);
        currentCall = call;

        call.on("stream",(remote)=>{
            document.getElementById("audio").srcObject = remote;
            setStatus("CONNECTED");
        });
    });

    /* incoming data connections */
    peer.on("connection",(conn)=>{

        conn.on("data",(data)=>{

            if(data.type === "presence"){

                peers.set(data.peerId, data);
                renderPeers();

            }
        });
    });

    /* start broadcasting presence */
    startBroadcast();
}

/* ----------------------------- */
/* BROADCAST SYSTEM */
/* ----------------------------- */

function startBroadcast(){

    setInterval(()=>{

        if(!peer) return;

        broadcastPresence();

    },1500);
}

/* ----------------------------- */
/* SEND PRESENCE */
/* ----------------------------- */

function broadcastPresence(){

    const data = {
        type:"presence",
        username:myName,
        peerId:peer.id
    };

    Object.values(peer.connections).forEach(list=>{
        list.forEach(conn=>{
            try{
                conn.send(data);
            }catch(e){}
        });
    });
}

/* ----------------------------- */
/* RENDER USERS */
/* ----------------------------- */

function renderPeers(){

    const discover = document.getElementById("discover");
    discover.innerHTML = "";

    peers.forEach(user=>{

        if(user.peerId === peer.id) return;

        const div = document.createElement("div");
        div.className = "user";

        div.innerHTML = `
            <span class="onlineDot"></span>
            ${user.username}
        `;

        div.onclick = ()=> callPeer(user.peerId);

        discover.appendChild(div);
    });
}

/* ----------------------------- */
/* CALL PEER */
/* ----------------------------- */

function callPeer(id){

    if(!peer || !stream) return;

    setStatus("CALLING...");

    const call = peer.call(id, stream);
    currentCall = call;

    call.on("stream",(remote)=>{
        document.getElementById("audio").srcObject = remote;
        setStatus("VOICE CONNECTED");
    });
}

</script>

</body>
</html>
